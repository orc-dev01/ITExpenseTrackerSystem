  <form
    class="login-card card shadow-sm"
    [formGroup]="form"
    (ngSubmit)="submit()"
  >
    <div class="card-body p-4 p-lg-5">
      <span class="badge rounded-pill text-bg-primary">IT-EPMS</span>
      <h1>IT Expense</h1>
      <!-- <p class="text-secondary mb-4">
        Choose an account to test role-based routes and request workflow.
      </p> -->

            >
            <small class="d-block text-secondary"

            >
          </button>
        </div>
        }
      </section> -->

      <div class="mb-3">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          class="form-control"
          type="email"
          formControlName="email"
          autocomplete="email"
          [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid"
        />
        @if (form.controls.email.touched &&
        form.controls.email.errors?.['required']) {
        <div class="text-danger small">email is required.</div>
        }
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          class="form-control"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
        @if (form.controls.password.touched &&
        form.controls.password.errors?.['required']) {
        <div class="text-danger small">Password is required.</div>
        }
      </div>

      @if (errorMessage) {
      <div class="alert alert-danger py-2">{{ errorMessage }}</div>
      }

      <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
    </div>
  </form>
</main>
