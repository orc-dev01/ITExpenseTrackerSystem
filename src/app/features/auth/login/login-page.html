<main class="login-screen">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <div>
      <span class="badge">IT-EPMS</span>
      <h1>IT Expense</h1>
      <p>Choose a mock account to test role-based routes and request workflow.</p>
    </div>

    <section class="account-grid" aria-label="Mock accounts">
      @for (account of accounts; track account.user.email) {
        <button class="account-button" type="button" (click)="useAccount(account)">
          <strong>{{ account.label }}</strong>
          <span>{{ account.user.email }}</span>
          <small>{{ account.user.roles.join(', ') }}</small>
        </button>
      }
    </section>

    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label>
      Password
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }

    <button class="submit-button" type="submit" [disabled]="loading">{{ loading ? 'Signing in...' : 'Sign in' }}</button>
  </form>
</main>
